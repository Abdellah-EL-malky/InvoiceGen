# =====================
# Server
# =====================
server.port=8080

# =====================
# Database (H2 local / Supabase prod)
# =====================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:invoicedb}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=true

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET:invoicegen-super-secret-key-2024-minimum-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =====================
# App
# =====================
app.name=InvoiceGen

# Supabase Session Pooler fixes
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
