# =====================
# Server
# =====================
server.port=8080

# =====================
# Database (H2 local / Supabase prod)
# =====================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:invoicedb}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=true

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET:invoicegen-super-secret-key-2024-minimum-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =====================
# App
# =====================
app.name=InvoiceGen
